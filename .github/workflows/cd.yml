name: CD SpringBoot Deploy
on:
  push:
    branches: [ "main" ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Otorgar permisos a gradlew
        run: chmod +x gradlew
      - name: Construir proyecto con Gradle
        run: ./gradlew build
      - name: Subir artefacto ejecutable (.jar)
        uses: actions/upload-artifact@v4
        with:
          name: lab6-springboot-executable
          path: build/libs/*.jar